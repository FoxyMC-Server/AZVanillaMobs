  turtle: 10
  cod: 20
  salmon: 20
  pufferfish: 15
  tropicalfish: 25
  tadpole: 30
  
  # Passive special
  villager: 15
  wanderingtrader: 3
  irongolem: 5
  snowgolem: 10
  allay: 10
  bee: 20
  frog: 15
  sniffer: 8
