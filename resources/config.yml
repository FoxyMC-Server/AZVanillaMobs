---
# AZVanillaMobs Configuration

# Map your worlds to their specific dimension type (overworld, nether, the_end)
worlds:
  "skyblock": "overworld"
  "normal": "overworld"
  "nether": "nether"
  "the_end": "the_end"

# Global cap for maximum mobs allowed on the server at once
global-mob-cap: 200

# Cap for maximum mobs allowed per world
per-world-mob-cap: 70

# Entity type limits (max number of specific mob types can spawn)
entity-type-limits:
  # Passive animals
  cow: 30
  pig: 25
  sheep: 25
  chicken: 40
  horse: 15
  donkey: 10
  mule: 10
  llama: 15
  traderllama: 8
